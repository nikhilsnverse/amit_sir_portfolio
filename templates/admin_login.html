<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Vision Teleradiology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 50%, #1B5E20 100%);
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: fadeUp 0.6s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    .login-logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #1E88E5, #2E7D32);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 1.4rem; color: #fff;
    }
    .login-card h1 { font-size: 1.3rem; font-weight: 700; color: #1a1a1a; }
    .login-card p { font-size: 0.82rem; color: #718096; margin: 4px 0 28px; }
    .form-group { text-align: left; margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid rgba(30,136,229,0.15); border-radius: 10px;
      font-size: 0.92rem; font-family: inherit;
      outline: none; transition: border-color 0.3s, box-shadow 0.3s;
      background: #f8faf8;
    }
    .form-group input:focus { border-color: #1E88E5; box-shadow: 0 0 0 3px rgba(30,136,229,0.08); }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: #a0aec0; font-size: 0.9rem;
    }
    .input-wrap input { padding-left: 42px; }
    .btn {
      width: 100%; padding: 13px;
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; font-family: inherit;
      background: linear-gradient(135deg, #1E88E5, #1565C0);
      color: #fff; cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(30,136,229,0.3); }
    .error { background: rgba(245,87,108,0.1); border: 1px solid rgba(245,87,108,0.25); color: #c0392b; padding: 10px 14px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 18px; }
    @media (max-width: 480px) { .login-card { padding: 32px 24px 28px; } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo"><i class="fas fa-shield-halved"></i></div>
    <h1>Admin Login</h1>
    <p>Vision Teleradiology — Contact Management</p>
    {% if error %}<div class="error"><i class="fas fa-circle-exclamation" style="margin-right:6px;"></i>{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" name="username" placeholder="Enter username" required autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn"><i class="fas fa-arrow-right-to-bracket" style="margin-right:8px;"></i> Sign In</button>
    </form>
  </div>
</body>
</html>
